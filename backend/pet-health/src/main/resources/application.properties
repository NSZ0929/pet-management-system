# ========================
# 应用基础配置
# ========================
spring.application.name=pet-health
server.port=8080

# ========================
# MySQL 数据库配置（针对MySQL 8.0+）
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/pethealth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA 配置
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 注意：移除hibernate.dialect配置，让Hibernate自动检测
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========================
# JWT 配置
# ========================
jwt.secret=4F6D3A2C9E8B7D1F4C6A3E8F1B2C4D6A
jwt.expiration=86400000

# ========================
# 日志配置
# ========================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.pethealth.pet_health=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 强制HTTP请求与响应使用UTF-8编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

